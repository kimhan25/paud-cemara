<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PAUD Cemara — Taman tempat anak belajar menjadi diri sendiri</title>
<!-- Leaflet Maps JavaScript API (gratis, tanpa API key, tile dari OpenStreetMap) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/shell.css">
<link rel="stylesheet" href="styles/pages-public.css">
<link rel="stylesheet" href="styles/pages-admin.css">
<style>
  /* Floating WA button */
  .wa-float {
    position: fixed; bottom: 24px; right: 24px;
    width: 60px; height: 60px; border-radius: 50%;
    background: var(--green); color: white;
    display: grid; place-items: center;
    font-size: 26px;
    border: 2.5px solid var(--ink);
    box-shadow: 0 4px 0 var(--ink), 0 10px 28px oklch(0.24 0.04 55 / 0.2);
    cursor: pointer; z-index: 50;
    transition: transform 0.15s;
    text-decoration: none;
  }
  .wa-float:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--ink), 0 14px 32px oklch(0.24 0.04 55 / 0.24); }
  .wa-float span { animation: wa-bob 3s ease-in-out infinite; }
  @keyframes wa-bob { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
  @media (max-width: 760px) {
    .wa-float {
      width: 50px; height: 50px;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      font-size: 22px;
      border-width: 2px;
      box-shadow: 0 3px 0 var(--ink), 0 10px 22px oklch(0.24 0.04 55 / 0.16);
    }
    .wa-float:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--ink), 0 12px 24px oklch(0.24 0.04 55 / 0.18); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/i18n.js"></script>

<script type="text/babel" src="src/pages-admin.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
